<!DOCTYPE html>
<!--
  Property Test: ParticleSystem Particle Count Invariant
  Feature: webcam-particle-face-ar, Property 7: Particle Count Invariant

  "For any count value set (including out-of-range values),
   ParticleSystem.setParticleCount(count) must ensure currentCount ∈ [500, 5000].
   Values are clamped to the nearest boundary."

  Validates: Requirement 5.1
  "THE Particle_Cloud SHALL chứa tối thiểu 500 Particle và tối đa 5000 Particle,
   với số lượng mặc định là 2000 Particle."

  How to run: Open this file in Chrome via localhost or HTTPS.
  Results are printed to the on-screen log and the browser console.
-->
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Property Test — ParticleSystem Count Invariant</title>
    <style>
        body {
            font-family: monospace;
            background: #0d0d0d;
            color: #e0e0e0;
            padding: 24px;
            margin: 0;
        }

        h1 {
            color: #00ffff;
            margin-bottom: 4px;
            font-size: 1.1rem;
        }

        h2 {
            color: #aaa;
            font-size: 0.85rem;
            font-weight: normal;
            margin-top: 0;
        }

        #log {
            margin-top: 20px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .pass {
            color: #00ff88;
        }

        .fail {
            color: #ff4444;
        }

        .info {
            color: #aaaaaa;
        }

        .warn {
            color: #ffcc00;
        }

        .title {
            color: #00ccff;
            font-weight: bold;
        }

        #summary {
            margin-top: 24px;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
        }

        #summary.all-pass {
            background: #003322;
            color: #00ff88;
            border: 1px solid #00ff88;
        }

        #summary.has-fail {
            background: #330000;
            color: #ff4444;
            border: 1px solid #ff4444;
        }
    </style>
</head>

<body>
    <h1>Property Test — ParticleSystem Count Invariant</h1>
    <h2>
        Feature: webcam-particle-face-ar &nbsp;|&nbsp;
        Property 7 &nbsp;|&nbsp;
        Validates: Requirement 5.1
    </h2>
    <div id="log"></div>
    <div id="summary"></div>

    <!-- fast-check (same version as the rest of the project) -->
    <script src="https://cdn.jsdelivr.net/npm/fast-check@3.13.2/lib/bundle/fast-check.min.js"></script>

    <!-- THREE.js stub — only the subset used by ParticleSystem is needed -->
    <script>
        const THREE = {
            // Minimal BufferAttribute
            BufferAttribute: class BufferAttribute {
                constructor(array, itemSize) {
                    this.array = array;
                    this.itemSize = itemSize;
                    this.needsUpdate = false;
                }
            },

            // Minimal BufferGeometry
            BufferGeometry: class BufferGeometry {
                constructor() { this._attrs = {}; }
                setAttribute(name, attr) { this._attrs[name] = attr; }
                get attributes() { return this._attrs; }
                dispose() { }
            },

            // Minimal PointsMaterial
            PointsMaterial: class PointsMaterial {
                constructor(opts) { Object.assign(this, opts); }
            },

            // Minimal Points mesh
            Points: class Points {
                constructor(geometry, material) {
                    this.geometry = geometry;
                    this.material = material;
                    this.position = new THREE.Vector3();
                    this.scale = { setScalar(s) { } };
                }
            },

            // Minimal Vector3
            Vector3: class Vector3 {
                constructor(x = 0, y = 0, z = 0) { this.x = x; this.y = y; this.z = z; }
                set(x, y, z) { this.x = x; this.y = y; this.z = z; return this; }
                copy(v) { this.x = v.x; this.y = v.y; this.z = v.z; return this; }
                lerp(v, t) {
                    this.x += (v.x - this.x) * t;
                    this.y += (v.y - this.y) * t;
                    this.z += (v.z - this.z) * t;
                    return this;
                }
            },
        };

        // Fix forward reference: Points uses THREE.Vector3 before it is defined above
        // (class bodies are evaluated top-to-bottom, so we patch after the fact)
        THREE.Points = class Points {
            constructor(geometry, material) {
                this.geometry = geometry;
                this.material = material;
                this.position = new THREE.Vector3();
                this.scale = { setScalar(s) { } };
            }
        };
    </script>

    <!-- CONSTANTS (full set so ParticleSystem resolves every reference) -->
    <script>
        const CONSTANTS = {
            DEPTH_SCALE: 50,
            DEFAULT_PARTICLE_COUNT: 2000,
            MIN_PARTICLES: 500,
            MAX_PARTICLES: 5000,
            LERP_POSITION: 0.1,
            LERP_SCALE: 0.08,
            LERP_BACK: 0.01,
            JITTER_RADIUS_NORMALIZED: 0.02,
            HAND_DIST_MIN: 0.05,
            HAND_DIST_MAX: 0.8,
            SCALE_MIN: 0.3,
            SCALE_MAX: 3.0,
            CAMERA_FOV: 75,
            CAMERA_Z: 100,
        };
    </script>

    <!-- Module under test -->
    <script src="../../js/ParticleSystem.js"></script>

    <script>
        // -------------------------------------------------------------------------
        // Minimal test harness (consistent with other property test files)
        // -------------------------------------------------------------------------
        const logEl = document.getElementById('log');
        const summaryEl = document.getElementById('summary');
        const results = [];

        function log(msg, cls = 'info') {
            const span = document.createElement('span');
            span.className = cls;
            span.textContent = msg + '\n';
            logEl.appendChild(span);
            console.log(msg);
        }

        function recordResult(name, passed, detail = '') {
            results.push({ name, passed });
            if (passed) {
                log(`  ✓ PASS  ${name}`, 'pass');
            } else {
                log(`  ✗ FAIL  ${name}`, 'fail');
                if (detail) log(`         ${detail}`, 'fail');
            }
        }

        // -------------------------------------------------------------------------
        // Helpers
        // -------------------------------------------------------------------------

        /**
         * Build a minimal CoordinateMapper stub that returns a fixed viewport.
         * ParticleSystem only calls computeViewport() for jitter/noise radius.
         */
        function makeCoordinateMapperStub() {
            return {
                computeViewport() {
                    // Viewport for FOV=75°, cameraZ=100, aspect 16:9
                    // height = 2 * tan(37.5° * π/180) * 100 ≈ 153.1
                    // width  = height * (16/9)              ≈ 272.2
                    return { width: 272.2, height: 153.1 };
                }
            };
        }

        /**
         * Build a minimal scene stub that accepts add/remove without error.
         */
        function makeSceneStub() {
            return {
                add(obj) { },
                remove(obj) { },
            };
        }

        /**
         * Create and initialise a ParticleSystem with the given initial count.
         */
        function makeParticleSystem(initialCount = 2000) {
            const scene = makeSceneStub();
            const mapper = makeCoordinateMapperStub();
            const ps = new ParticleSystem(scene, mapper, initialCount);
            ps.init();
            return ps;
        }

        // -------------------------------------------------------------------------
        // Property 7: Particle Count Invariant
        // Feature: webcam-particle-face-ar, Property 7: Particle Count Invariant
        // Validates: Requirement 5.1
        // -------------------------------------------------------------------------

        /**
         * 7a — setParticleCount with arbitrary integers (including far out-of-range)
         *      always results in currentCount ∈ [500, 5000].
         */
        async function runProperty7a() {
            log('\n── Property 7a: setParticleCount clamps arbitrary integers ──', 'title');
            log('   Validates: Requirement 5.1', 'info');
            log('   Generator: fc.integer({ min: -1000, max: 10000 })', 'info');
            log('   Iterations: 200\n', 'info');

            let passed = true;
            let failDetail = '';

            try {
                await fc.assert(
                    fc.asyncProperty(
                        fc.integer({ min: -1000, max: 10000 }),
                        async (count) => {
                            const ps = makeParticleSystem(2000);
                            ps.setParticleCount(count);

                            const actual = ps.currentCount;
                            if (actual < CONSTANTS.MIN_PARTICLES || actual > CONSTANTS.MAX_PARTICLES) {
                                throw new Error(
                                    `setParticleCount(${count}) → currentCount=${actual}, ` +
                                    `expected ∈ [${CONSTANTS.MIN_PARTICLES}, ${CONSTANTS.MAX_PARTICLES}]`
                                );
                            }
                        }
                    ),
                    { numRuns: 200 }
                );
            } catch (err) {
                passed = false;
                failDetail = err.message || String(err);
            }

            recordResult(
                'Property 7a — setParticleCount(n) → currentCount ∈ [500, 5000] for n ∈ [-1000, 10000]',
                passed,
                failDetail
            );
        }

        /**
         * 7b — Constructor also clamps the initial count.
         *      new ParticleSystem(scene, mapper, count).currentCount ∈ [500, 5000].
         */
        async function runProperty7b() {
            log('\n── Property 7b: Constructor clamps initial count ──', 'title');
            log('   Validates: Requirement 5.1', 'info');
            log('   Generator: fc.integer({ min: -1000, max: 10000 })', 'info');
            log('   Iterations: 200\n', 'info');

            let passed = true;
            let failDetail = '';

            try {
                await fc.assert(
                    fc.asyncProperty(
                        fc.integer({ min: -1000, max: 10000 }),
                        async (count) => {
                            const ps = makeParticleSystem(count);
                            const actual = ps.currentCount;

                            if (actual < CONSTANTS.MIN_PARTICLES || actual > CONSTANTS.MAX_PARTICLES) {
                                throw new Error(
                                    `new ParticleSystem(…, ${count}).currentCount=${actual}, ` +
                                    `expected ∈ [${CONSTANTS.MIN_PARTICLES}, ${CONSTANTS.MAX_PARTICLES}]`
                                );
                            }
                        }
                    ),
                    { numRuns: 200 }
                );
            } catch (err) {
                passed = false;
                failDetail = err.message || String(err);
            }

            recordResult(
                'Property 7b — new ParticleSystem(…, n).currentCount ∈ [500, 5000] for n ∈ [-1000, 10000]',
                passed,
                failDetail
            );
        }

        /**
         * 7c — Clamping direction: values below MIN clamp to MIN, values above MAX clamp to MAX,
         *      values in-range are preserved exactly.
         */
        async function runProperty7c() {
            log('\n── Property 7c: Clamping direction is correct ──', 'title');
            log('   Validates: Requirement 5.1', 'info');
            log('   Iterations: 200\n', 'info');

            let passed = true;
            let failDetail = '';

            try {
                await fc.assert(
                    fc.asyncProperty(
                        fc.integer({ min: -1000, max: 10000 }),
                        async (count) => {
                            const ps = makeParticleSystem(2000);
                            ps.setParticleCount(count);

                            const actual = ps.currentCount;
                            const rounded = Math.round(count);

                            let expected;
                            if (rounded < CONSTANTS.MIN_PARTICLES) {
                                expected = CONSTANTS.MIN_PARTICLES;
                            } else if (rounded > CONSTANTS.MAX_PARTICLES) {
                                expected = CONSTANTS.MAX_PARTICLES;
                            } else {
                                expected = rounded;
                            }

                            if (actual !== expected) {
                                throw new Error(
                                    `setParticleCount(${count}) → currentCount=${actual}, ` +
                                    `expected ${expected} (rounded=${rounded})`
                                );
                            }
                        }
                    ),
                    { numRuns: 200 }
                );
            } catch (err) {
                passed = false;
                failDetail = err.message || String(err);
            }

            recordResult(
                'Property 7c — clamping direction: below MIN→500, above MAX→5000, in-range→exact',
                passed,
                failDetail
            );
        }

        // -------------------------------------------------------------------------
        // Edge-case tests (example-based, complement the PBT properties)
        // -------------------------------------------------------------------------
        async function runEdgeCases() {
            log('\n── Edge Cases (complement to Property 7) ──', 'title');

            const cases = [
                // [input, expectedOutput, label]
                [500, 500, 'exact minimum (500)'],
                [5000, 5000, 'exact maximum (5000)'],
                [499, 500, 'one below minimum (499 → 500)'],
                [5001, 5000, 'one above maximum (5001 → 5000)'],
                [0, 500, 'zero → clamped to 500'],
                [-1000, 500, 'large negative → clamped to 500'],
                [10000, 5000, 'large positive → clamped to 5000'],
                [2000, 2000, 'default value (2000) preserved'],
                [2000.7, 2001, 'float rounds to nearest integer (2000.7 → 2001)'],
                [499.4, 500, 'float rounds to 499 then clamps to 500 (499.4 → 500)'],
            ];

            for (const [input, expected, label] of cases) {
                const ps = makeParticleSystem(2000);
                ps.setParticleCount(input);
                const actual = ps.currentCount;
                recordResult(
                    `Edge: ${label}`,
                    actual === expected,
                    `setParticleCount(${input}) → got ${actual}, expected ${expected}`
                );
            }
        }

        // -------------------------------------------------------------------------
        // Run all tests
        // -------------------------------------------------------------------------
        async function runAll() {
            log('Starting ParticleSystem count invariant property tests…\n', 'info');

            await runProperty7a();
            await runProperty7b();
            await runProperty7c();
            await runEdgeCases();

            const total = results.length;
            const passed = results.filter(r => r.passed).length;
            const failed = total - passed;

            log('', 'info');
            summaryEl.className = failed === 0 ? 'all-pass' : 'has-fail';
            summaryEl.textContent = failed === 0
                ? `✓ All ${total} tests passed`
                : `✗ ${failed} of ${total} tests FAILED`;

            console.log(`\nResults: ${passed}/${total} passed`);
        }

        document.addEventListener('DOMContentLoaded', runAll);
    </script>
</body>

</html>
