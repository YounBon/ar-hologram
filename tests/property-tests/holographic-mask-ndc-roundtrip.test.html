<!DOCTYPE html>
<!--
  Property Tests: Holographic Window Mask — NDC Normalization Round-Trip
  Feature: holographic-window-mask

  Properties covered:
    Property 4: NDC Normalization Round-Trip

  Validates: Requirements 4.2

  How to run: Open this file in Chrome via localhost or HTTPS.
  Results are printed to the on-screen log and the browser console.
-->
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Property Tests — Holographic Mask NDC Round-Trip</title>
    <style>
        body {
            font-family: monospace;
            background: #0d0d0d;
            color: #e0e0e0;
            padding: 24px;
            margin: 0;
        }

        h1 {
            color: #00ffff;
            margin-bottom: 4px;
            font-size: 1.1rem;
        }

        h2 {
            color: #aaa;
            font-size: 0.85rem;
            font-weight: normal;
            margin-top: 0;
        }

        #log {
            margin-top: 20px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .pass {
            color: #00ff88;
        }

        .fail {
            color: #ff4444;
        }

        .info {
            color: #aaaaaa;
        }

        .warn {
            color: #ffcc00;
        }

        .title {
            color: #00ccff;
            font-weight: bold;
        }

        #summary {
            margin-top: 24px;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
        }

        #summary.all-pass {
            background: #003322;
            color: #00ff88;
            border: 1px solid #00ff88;
        }

        #summary.has-fail {
            background: #330000;
            color: #ff4444;
            border: 1px solid #ff4444;
        }
    </style>
</head>

<body>
    <h1>Property Tests — Holographic Mask NDC Round-Trip</h1>
    <h2>
        Feature: holographic-window-mask &nbsp;|&nbsp;
        Property 4: NDC Normalization Round-Trip &nbsp;|&nbsp;
        Validates: Requirements 4.2
    </h2>
    <div id="log"></div>
    <div id="summary"></div>

    <!-- fast-check (same version as the rest of the project) -->
    <script src="https://cdn.jsdelivr.net/npm/fast-check@3.13.2/lib/bundle/fast-check.min.js"></script>

    <script>
        // -------------------------------------------------------------------------
        // Minimal test harness (same style as coordinatemapper.test.html)
        // -------------------------------------------------------------------------
        const logEl = document.getElementById('log');
        const summaryEl = document.getElementById('summary');
        const results = [];

        function log(msg, cls = 'info') {
            const span = document.createElement('span');
            span.className = cls;
            span.textContent = msg + '\n';
            logEl.appendChild(span);
            console.log(msg);
        }

        function recordResult(name, passed, detail = '') {
            results.push({ name, passed });
            if (passed) {
                log(`  ✓ PASS  ${name}`, 'pass');
            } else {
                log(`  ✗ FAIL  ${name}`, 'fail');
                if (detail) log(`         ${detail}`, 'fail');
            }
        }

        // -------------------------------------------------------------------------
        // Pure NDC normalization function — mirrors the formula used in
        // ParticleSystem.updateHandBox():
        //   ndcValue = px / viewportSize
        // Round-trip: (px / viewportSize) * viewportSize ≈ px
        // -------------------------------------------------------------------------
        function ndcNormalize(px, viewportSize) {
            return px / viewportSize;
        }

        function ndcRoundTrip(px, viewportSize) {
            return ndcNormalize(px, viewportSize) * viewportSize;
        }

        // -------------------------------------------------------------------------
        // Property 4: NDC Normalization Round-Trip
        // Feature: holographic-window-mask, Property 4: NDC Normalization Round-Trip
        // Validates: Requirements 4.2
        //
        // For any pixel coordinate px in [0, W] and viewport size W in [320, 3840],
        // the round-trip (px / W) * W must recover px with error < 0.001.
        // -------------------------------------------------------------------------
        async function runProperty4() {
            log('\n── Property 4: NDC Normalization Round-Trip ──', 'title');
            log('   Validates: Requirements 4.2', 'info');
            log('   Iterations: 200\n', 'info');

            let passed = true;
            let failDetail = '';

            const ERROR_THRESHOLD = 0.001;

            try {
                // 4a: X-axis round-trip — pixel x in [0, viewportWidth]
                await fc.assert(
                    fc.asyncProperty(
                        fc.tuple(
                            fc.float({ min: 0, max: 1920, noNaN: true }),
                            fc.float({ min: 0, max: 1080, noNaN: true })
                        ),
                        fc.tuple(
                            fc.integer({ min: 320, max: 3840 }),
                            fc.integer({ min: 240, max: 2160 })
                        ),
                        async ([px, py], [W, H]) => {
                            // X round-trip: (px / W) * W ≈ px
                            const recoveredX = ndcRoundTrip(px, W);
                            const errorX = Math.abs(recoveredX - px);
                            if (errorX >= ERROR_THRESHOLD) {
                                throw new Error(
                                    `X round-trip failed: px=${px}, W=${W}\n` +
                                    `  ndc=${ndcNormalize(px, W)}, recovered=${recoveredX}\n` +
                                    `  error=${errorX} (threshold=${ERROR_THRESHOLD})`
                                );
                            }

                            // Y round-trip: (py / H) * H ≈ py
                            const recoveredY = ndcRoundTrip(py, H);
                            const errorY = Math.abs(recoveredY - py);
                            if (errorY >= ERROR_THRESHOLD) {
                                throw new Error(
                                    `Y round-trip failed: py=${py}, H=${H}\n` +
                                    `  ndc=${ndcNormalize(py, H)}, recovered=${recoveredY}\n` +
                                    `  error=${errorY} (threshold=${ERROR_THRESHOLD})`
                                );
                            }
                        }
                    ),
                    { numRuns: 200 }
                );
            } catch (err) {
                passed = false;
                failDetail = err.message || String(err);
            }

            recordResult(
                'Property 4 — NDC round-trip (px / W) * W ≈ px with error < 0.001',
                passed,
                failDetail
            );
        }

        // -------------------------------------------------------------------------
        // Run all properties
        // -------------------------------------------------------------------------
        async function runAll() {
            log('Starting Holographic Mask NDC Round-Trip property tests…\n', 'info');

            await runProperty4();

            const total = results.length;
            const passed = results.filter(r => r.passed).length;
            const failed = total - passed;

            log('', 'info');
            summaryEl.className = failed === 0 ? 'all-pass' : 'has-fail';
            summaryEl.textContent = failed === 0
                ? `✓ All ${total} tests passed`
                : `✗ ${failed} of ${total} tests FAILED`;

            console.log(`\nResults: ${passed}/${total} passed`);
        }

        document.addEventListener('DOMContentLoaded', runAll);
    </script>
</body>

</html>
