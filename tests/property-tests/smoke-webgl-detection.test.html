<!DOCTYPE html>
<!--
  Smoke Test: WebGL 2.0 Detection
  Feature: webcam-particle-face-ar
  Task 13.1

  Tests the WebGL 2.0 detection logic used in both the inline <head> script
  and AppController.init(). Verifies that the correct Vietnamese error message
  is produced when the browser does not support WebGL 2.0.

  Validates: Requirement 12.5
  "IF trình duyệt không hỗ trợ WebGL 2.0, THEN THE System SHALL hiển thị
   thông báo yêu cầu nâng cấp trình duyệt và dừng khởi tạo."

  How to run: Open this file in Chrome via localhost or HTTPS.
-->
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smoke Test — WebGL 2.0 Detection</title>
    <style>
        body {
            font-family: monospace;
            background: #0d0d0d;
            color: #e0e0e0;
            padding: 24px;
            margin: 0;
        }

        h1 {
            color: #00ffff;
            margin-bottom: 4px;
            font-size: 1.1rem;
        }

        h2 {
            color: #aaa;
            font-size: 0.85rem;
            font-weight: normal;
            margin-top: 0;
        }

        #log {
            margin-top: 20px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .pass {
            color: #00ff88;
        }

        .fail {
            color: #ff4444;
        }

        .info {
            color: #aaaaaa;
        }

        .title {
            color: #00ccff;
            font-weight: bold;
        }

        #summary {
            margin-top: 24px;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
        }

        #summary.all-pass {
            background: #003322;
            color: #00ff88;
            border: 1px solid #00ff88;
        }

        #summary.has-fail {
            background: #330000;
            color: #ff4444;
            border: 1px solid #ff4444;
        }
    </style>
</head>

<body>
    <h1>Smoke Test — WebGL 2.0 Detection</h1>
    <h2>Feature: webcam-particle-face-ar &nbsp;|&nbsp; Task 13.1 &nbsp;|&nbsp; Validates: Requirement 12.5</h2>
    <div id="log"></div>
    <div id="summary"></div>

    <script>
        const logEl = document.getElementById('log');
        const summaryEl = document.getElementById('summary');
        const results = [];

        function log(msg, cls = 'info') {
            const span = document.createElement('span');
            span.className = cls;
            span.textContent = msg + '\n';
            logEl.appendChild(span);
            console.log(msg);
        }

        function recordResult(name, passed, detail = '') {
            results.push({ name, passed });
            if (passed) {
                log(`  ✓ PASS  ${name}`, 'pass');
            } else {
                log(`  ✗ FAIL  ${name}`, 'fail');
                if (detail) log(`         ${detail}`, 'fail');
            }
        }

        // -------------------------------------------------------------------------
        // The WebGL 2.0 detection logic extracted from AppController.init() and
        // the inline <head> script in index.html.
        //
        // Returns the error message string if WebGL 2.0 is not supported,
        // or null if supported.
        //
        // @param {function(): HTMLCanvasElement} [createCanvas]  Injectable canvas factory
        // -------------------------------------------------------------------------
        function checkWebGL2(createCanvas) {
            if (!createCanvas) {
                createCanvas = () => document.createElement('canvas');
            }
            const canvas = createCanvas();
            if (!canvas.getContext('webgl2')) {
                return 'Trình duyệt của bạn không hỗ trợ WebGL 2.0. Vui lòng cập nhật Chrome lên phiên bản 90 trở lên.';
            }
            return null;
        }

        const EXPECTED_MSG = 'Trình duyệt của bạn không hỗ trợ WebGL 2.0. Vui lòng cập nhật Chrome lên phiên bản 90 trở lên.';

        // -------------------------------------------------------------------------
        // Test 1: Real browser — WebGL 2.0 should be available in Chrome 90+
        // -------------------------------------------------------------------------
        function testWebGL2AvailableInBrowser() {
            log('\n── Test 1: Current browser supports WebGL 2.0 ──', 'title');

            const ctx = document.createElement('canvas').getContext('webgl2');

            recordResult(
                'canvas.getContext("webgl2") returns a non-null context in current browser',
                ctx !== null,
                ctx === null ? 'WebGL 2.0 is not available — open this file in Chrome 90+' : ''
            );
        }

        // -------------------------------------------------------------------------
        // Test 2: Simulated missing WebGL 2.0 → correct Vietnamese error message
        // -------------------------------------------------------------------------
        function testWebGL2NotSupported() {
            log('\n── Test 2: WebGL 2.0 not supported → correct error message ──', 'title');

            const stubCanvas = {
                getContext(type) {
                    return null; // always null — simulates no WebGL 2.0
                }
            };

            const errorMsg = checkWebGL2(() => stubCanvas);

            recordResult(
                'Missing WebGL 2.0 → returns correct Vietnamese error message',
                errorMsg === EXPECTED_MSG,
                `Got:      "${errorMsg}"\nExpected: "${EXPECTED_MSG}"`
            );
        }

        // -------------------------------------------------------------------------
        // Test 3: Simulated WebGL 2.0 present → no error
        // -------------------------------------------------------------------------
        function testWebGL2Supported() {
            log('\n── Test 3: WebGL 2.0 supported → no error ──', 'title');

            const stubCanvas = {
                getContext(type) {
                    if (type === 'webgl2') return {}; // truthy context object
                    return null;
                }
            };

            const errorMsg = checkWebGL2(() => stubCanvas);

            recordResult(
                'WebGL 2.0 present → checkWebGL2 returns null (no error)',
                errorMsg === null,
                `Expected null, got: "${errorMsg}"`
            );
        }

        // -------------------------------------------------------------------------
        // Test 4: Error message content validation
        // -------------------------------------------------------------------------
        function testErrorMessageContent() {
            log('\n── Test 4: Error message content validation ──', 'title');

            const stubCanvas = { getContext() { return null; } };
            const errorMsg = checkWebGL2(() => stubCanvas);

            recordResult(
                'Error message contains "WebGL 2.0"',
                errorMsg !== null && errorMsg.includes('WebGL 2.0'),
                `Message: "${errorMsg}"`
            );
            recordResult(
                'Error message contains "Chrome"',
                errorMsg !== null && errorMsg.includes('Chrome'),
                `Message: "${errorMsg}"`
            );
            recordResult(
                'Error message is in Vietnamese (contains "Trình duyệt")',
                errorMsg !== null && errorMsg.includes('Trình duyệt'),
                `Message: "${errorMsg}"`
            );
            recordResult(
                'Error message mentions version 90 ("phiên bản 90")',
                errorMsg !== null && errorMsg.includes('phiên bản 90'),
                `Message: "${errorMsg}"`
            );
        }

        // -------------------------------------------------------------------------
        // Test 5: Error overlay DOM integration
        // -------------------------------------------------------------------------
        function testErrorOverlayDOM() {
            log('\n── Test 5: Error overlay DOM integration ──', 'title');

            // --- 5a: WebGL 2.0 NOT supported → overlay becomes visible ---
            const overlay = document.createElement('div');
            overlay.id = 'test-error-overlay';
            overlay.style.display = 'none';

            const msgEl = document.createElement('div');
            msgEl.id = 'test-error-message';

            overlay.appendChild(msgEl);
            document.body.appendChild(overlay);

            // Simulate the inline <head> script logic
            const noWebGLCanvas = { getContext() { return null; } };
            if (!noWebGLCanvas.getContext('webgl2')) {
                msgEl.textContent = EXPECTED_MSG;
                overlay.style.display = 'flex';
            }

            recordResult(
                'error-overlay becomes visible when WebGL 2.0 is not supported',
                overlay.style.display !== 'none' && overlay.style.display !== '',
                `display was: "${overlay.style.display}"`
            );
            recordResult(
                'error-message textContent equals the expected Vietnamese message',
                msgEl.textContent === EXPECTED_MSG,
                `Got:      "${msgEl.textContent}"\nExpected: "${EXPECTED_MSG}"`
            );

            // --- 5b: WebGL 2.0 IS supported → overlay stays hidden ---
            const overlay2 = document.createElement('div');
            overlay2.id = 'test-error-overlay-2';
            overlay2.style.display = 'none';

            const msgEl2 = document.createElement('div');
            msgEl2.id = 'test-error-message-2';
            overlay2.appendChild(msgEl2);
            document.body.appendChild(overlay2);

            const hasWebGLCanvas = { getContext(type) { return type === 'webgl2' ? {} : null; } };
            if (!hasWebGLCanvas.getContext('webgl2')) {
                msgEl2.textContent = EXPECTED_MSG;
                overlay2.style.display = 'flex';
            }

            recordResult(
                'error-overlay stays hidden when WebGL 2.0 IS supported',
                overlay2.style.display === 'none' || overlay2.style.display === '',
                `display was: "${overlay2.style.display}"`
            );

            // Clean up
            document.body.removeChild(overlay);
            document.body.removeChild(overlay2);
        }

        // -------------------------------------------------------------------------
        // Test 6: AppController.init() guard — stops initialisation on no WebGL 2.0
        // -------------------------------------------------------------------------
        function testAppControllerGuard() {
            log('\n── Test 6: AppController.init() guard — stops initialisation on no WebGL 2.0 ──', 'title');

            // --- 6a: WebGL 2.0 NOT available → _showError called with correct args ---
            let showErrorCalled = false;
            let showErrorArgs = null;

            const stubController = {
                _showError(message, recoverable) {
                    showErrorCalled = true;
                    showErrorArgs = [message, recoverable];
                }
            };

            // Simulate the guard from AppController.init() Step 1
            function simulateInitGuard(controller, createCanvas) {
                const canvas = createCanvas();
                if (!canvas.getContext('webgl2')) {
                    controller._showError(EXPECTED_MSG, false);
                    return false; // init stopped
                }
                return true; // init continued
            }

            const noWebGLCanvas = { getContext() { return null; } };
            const initContinued = simulateInitGuard(stubController, () => noWebGLCanvas);

            recordResult(
                '_showError is called when WebGL 2.0 is not available',
                showErrorCalled === true,
                'Expected _showError to be called'
            );
            recordResult(
                '_showError is called with the correct Vietnamese message',
                showErrorArgs !== null && showErrorArgs[0] === EXPECTED_MSG,
                `Got message: "${showErrorArgs && showErrorArgs[0]}"`
            );
            recordResult(
                '_showError is called with recoverable = false',
                showErrorArgs !== null && showErrorArgs[1] === false,
                `Got recoverable: ${showErrorArgs && showErrorArgs[1]}`
            );
            recordResult(
                'init() stops (returns false) when WebGL 2.0 is not available',
                initContinued === false,
                'Expected init to stop after _showError'
            );

            // --- 6b: WebGL 2.0 IS available → _showError NOT called ---
            let showErrorCalledWhenSupported = false;

            const stubController2 = {
                _showError() {
                    showErrorCalledWhenSupported = true;
                }
            };

            const hasWebGLCanvas = { getContext(type) { return type === 'webgl2' ? {} : null; } };
            const initContinued2 = simulateInitGuard(stubController2, () => hasWebGLCanvas);

            recordResult(
                '_showError is NOT called when WebGL 2.0 IS available',
                showErrorCalledWhenSupported === false,
                'Expected _showError NOT to be called when WebGL 2.0 is supported'
            );
            recordResult(
                'init() continues (returns true) when WebGL 2.0 IS available',
                initContinued2 === true,
                'Expected init to continue when WebGL 2.0 is supported'
            );
        }

        // -------------------------------------------------------------------------
        // Run all tests
        // -------------------------------------------------------------------------
        function runAll() {
            log('Starting WebGL 2.0 detection smoke tests…\n', 'info');

            testWebGL2AvailableInBrowser();
            testWebGL2NotSupported();
            testWebGL2Supported();
            testErrorMessageContent();
            testErrorOverlayDOM();
            testAppControllerGuard();

            const total = results.length;
            const passed = results.filter(r => r.passed).length;
            const failed = total - passed;

            log('', 'info');
            summaryEl.className = failed === 0 ? 'all-pass' : 'has-fail';
            summaryEl.textContent = failed === 0
                ? `✓ All ${total} tests passed`
                : `✗ ${failed} of ${total} tests FAILED`;

            console.log(`\nResults: ${passed}/${total} passed`);
        }

        document.addEventListener('DOMContentLoaded', runAll);
    </script>
</body>

</html>
