<!DOCTYPE html>
<!--
  Property Tests: Holographic Window Mask — Hand Box NDC in [0, 1]
  Feature: holographic-window-mask

  Properties covered:
    Property 2: Hand Box NDC Is in [0, 1]

  Validates: Requirements 4.5

  How to run: Open this file in Chrome via localhost or HTTPS.
  Results are printed to the on-screen log and the browser console.
-->
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Property Tests — Holographic Mask NDC Bounds</title>
    <style>
        body {
            font-family: monospace;
            background: #0d0d0d;
            color: #e0e0e0;
            padding: 24px;
            margin: 0;
        }

        h1 {
            color: #00ffff;
            margin-bottom: 4px;
            font-size: 1.1rem;
        }

        h2 {
            color: #aaa;
            font-size: 0.85rem;
            font-weight: normal;
            margin-top: 0;
        }

        #log {
            margin-top: 20px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .pass {
            color: #00ff88;
        }

        .fail {
            color: #ff4444;
        }

        .info {
            color: #aaaaaa;
        }

        .warn {
            color: #ffcc00;
        }

        .title {
            color: #00ccff;
            font-weight: bold;
        }

        #summary {
            margin-top: 24px;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
        }

        #summary.all-pass {
            background: #003322;
            color: #00ff88;
            border: 1px solid #00ff88;
        }

        #summary.has-fail {
            background: #330000;
            color: #ff4444;
            border: 1px solid #ff4444;
        }
    </style>
</head>

<body>
    <h1>Property Tests — Holographic Mask NDC Bounds</h1>
    <h2>
        Feature: holographic-window-mask &nbsp;|&nbsp;
        Property 2: Hand Box NDC Is in [0, 1] &nbsp;|&nbsp;
        Validates: Requirements 4.5
    </h2>
    <div id="log"></div>
    <div id="summary"></div>

    <!-- fast-check (same version as the rest of the project) -->
    <script src="https://cdn.jsdelivr.net/npm/fast-check@3.13.2/lib/bundle/fast-check.min.js"></script>

    <script>
        // -------------------------------------------------------------------------
        // Minimal test harness
        // -------------------------------------------------------------------------
        const logEl = document.getElementById('log');
        const summaryEl = document.getElementById('summary');
        const results = [];

        function log(msg, cls = 'info') {
            const span = document.createElement('span');
            span.className = cls;
            span.textContent = msg + '\n';
            logEl.appendChild(span);
            console.log(msg);
        }

        function recordResult(name, passed, detail = '') {
            results.push({ name, passed });
            if (passed) {
                log(`  ✓ PASS  ${name}`, 'pass');
            } else {
                log(`  ✗ FAIL  ${name}`, 'fail');
                if (detail) log(`         ${detail}`, 'fail');
            }
        }

        // -------------------------------------------------------------------------
        // Pure NDC computation — mirrors ParticleSystem.updateHandBox() logic
        // exactly, including the y-axis flip for WebGL (origin bottom-left).
        //
        //   minX = clamp(box.left   / W, 0, 1)
        //   maxX = clamp(box.right  / W, 0, 1)
        //   minY = clamp((H - box.bottom) / H, 0, 1)  ← CSS bottom → WebGL y-min
        //   maxY = clamp((H - box.top)    / H, 0, 1)  ← CSS top    → WebGL y-max
        //
        // Returns { minX, maxX, minY, maxY } — the u_boxMin / u_boxMax values.
        // After sorting min/max (in case box coords are inverted), all four values
        // must lie in [0, 1].
        // -------------------------------------------------------------------------
        function clamp(v, lo, hi) {
            return Math.max(lo, Math.min(hi, v));
        }

        function computeNDC(box, W, H) {
            const rawMinX = clamp(box.left / W, 0, 1);
            const rawMaxX = clamp(box.right / W, 0, 1);
            const rawMinY = clamp((H - box.bottom) / H, 0, 1);
            const rawMaxY = clamp((H - box.top) / H, 0, 1);

            // Sort so that minX ≤ maxX and minY ≤ maxY regardless of input order
            return {
                minX: Math.min(rawMinX, rawMaxX),
                maxX: Math.max(rawMinX, rawMaxX),
                minY: Math.min(rawMinY, rawMaxY),
                maxY: Math.max(rawMinY, rawMaxY),
            };
        }

        // -------------------------------------------------------------------------
        // Property 2: Hand Box NDC Is in [0, 1]
        // Feature: holographic-window-mask, Property 2: Hand Box NDC Is in [0, 1]
        // Validates: Requirements 4.5
        //
        // For any Hand_Box_Screen with arbitrary pixel coordinates (including
        // out-of-bounds values), the NDC values computed by computeNDC() must
        // satisfy:
        //   0 ≤ u_boxMin.x ≤ u_boxMax.x ≤ 1
        //   0 ≤ u_boxMin.y ≤ u_boxMax.y ≤ 1
        // -------------------------------------------------------------------------
        async function runProperty2() {
            log('\n── Property 2: Hand Box NDC Is in [0, 1] ──', 'title');
            log('   Validates: Requirements 4.5', 'info');
            log('   Iterations: 200\n', 'info');

            let passed = true;
            let failDetail = '';

            try {
                await fc.assert(
                    fc.asyncProperty(
                        fc.record({
                            left: fc.integer({ min: -500, max: 3000 }),
                            top: fc.integer({ min: -500, max: 2000 }),
                            right: fc.integer({ min: -500, max: 3000 }),
                            bottom: fc.integer({ min: -500, max: 2000 }),
                        }),
                        fc.tuple(
                            fc.integer({ min: 320, max: 3840 }),
                            fc.integer({ min: 240, max: 2160 })
                        ),
                        async (box, [W, H]) => {
                            const ndc = computeNDC(box, W, H);

                            // All four values must be in [0, 1]
                            if (ndc.minX < 0 || ndc.minX > 1) {
                                throw new Error(
                                    `minX out of [0,1]: ${ndc.minX} (box=${JSON.stringify(box)}, W=${W})`
                                );
                            }
                            if (ndc.maxX < 0 || ndc.maxX > 1) {
                                throw new Error(
                                    `maxX out of [0,1]: ${ndc.maxX} (box=${JSON.stringify(box)}, W=${W})`
                                );
                            }
                            if (ndc.minY < 0 || ndc.minY > 1) {
                                throw new Error(
                                    `minY out of [0,1]: ${ndc.minY} (box=${JSON.stringify(box)}, H=${H})`
                                );
                            }
                            if (ndc.maxY < 0 || ndc.maxY > 1) {
                                throw new Error(
                                    `maxY out of [0,1]: ${ndc.maxY} (box=${JSON.stringify(box)}, H=${H})`
                                );
                            }

                            // Ordering invariant: min ≤ max
                            if (ndc.minX > ndc.maxX) {
                                throw new Error(
                                    `minX > maxX: ${ndc.minX} > ${ndc.maxX} (box=${JSON.stringify(box)}, W=${W})`
                                );
                            }
                            if (ndc.minY > ndc.maxY) {
                                throw new Error(
                                    `minY > maxY: ${ndc.minY} > ${ndc.maxY} (box=${JSON.stringify(box)}, H=${H})`
                                );
                            }
                        }
                    ),
                    { numRuns: 200 }
                );
            } catch (err) {
                passed = false;
                failDetail = err.message || String(err);
            }

            recordResult(
                'Property 2 — NDC values in [0,1] and minX ≤ maxX, minY ≤ maxY',
                passed,
                failDetail
            );
        }

        // -------------------------------------------------------------------------
        // 2b: Edge case — null-like degenerate box (left === right, top === bottom)
        // NDC should still be valid (a zero-area window is allowed)
        // -------------------------------------------------------------------------
        async function runProperty2b() {
            log('\n── Property 2b: Degenerate (zero-area) box NDC still in [0, 1] ──', 'title');
            log('   Validates: Requirements 4.5 (edge case)', 'info');
            log('   Iterations: 100\n', 'info');

            let passed = true;
            let failDetail = '';

            try {
                await fc.assert(
                    fc.asyncProperty(
                        fc.tuple(
                            fc.integer({ min: 0, max: 1920 }),
                            fc.integer({ min: 0, max: 1080 })
                        ),
                        fc.tuple(
                            fc.integer({ min: 320, max: 3840 }),
                            fc.integer({ min: 240, max: 2160 })
                        ),
                        async ([px, py], [W, H]) => {
                            // Degenerate box: all four coords at the same point
                            const box = { left: px, top: py, right: px, bottom: py };
                            const ndc = computeNDC(box, W, H);

                            if (ndc.minX < 0 || ndc.minX > 1 ||
                                ndc.maxX < 0 || ndc.maxX > 1 ||
                                ndc.minY < 0 || ndc.minY > 1 ||
                                ndc.maxY < 0 || ndc.maxY > 1) {
                                throw new Error(
                                    `Degenerate box NDC out of [0,1]: ${JSON.stringify(ndc)} ` +
                                    `(px=${px}, py=${py}, W=${W}, H=${H})`
                                );
                            }
                        }
                    ),
                    { numRuns: 100 }
                );
            } catch (err) {
                passed = false;
                failDetail = err.message || String(err);
            }

            recordResult(
                'Property 2b — Degenerate box NDC still in [0,1]',
                passed,
                failDetail
            );
        }

        // -------------------------------------------------------------------------
        // Run all properties
        // -------------------------------------------------------------------------
        async function runAll() {
            log('Starting Holographic Mask NDC Bounds property tests…\n', 'info');

            await runProperty2();
            await runProperty2b();

            const total = results.length;
            const passed = results.filter(r => r.passed).length;
            const failed = total - passed;

            log('', 'info');
            summaryEl.className = failed === 0 ? 'all-pass' : 'has-fail';
            summaryEl.textContent = failed === 0
                ? `✓ All ${total} tests passed`
                : `✗ ${failed} of ${total} tests FAILED`;

            console.log(`\nResults: ${passed}/${total} passed`);
        }

        document.addEventListener('DOMContentLoaded', runAll);
    </script>
</body>

</html>
