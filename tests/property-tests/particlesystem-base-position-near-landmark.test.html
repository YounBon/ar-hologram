<!DOCTYPE html>
<!--
  Property Test: ParticleSystem Base Position Near Assigned Landmark
  Feature: webcam-particle-face-ar, Property 8: Particle Base Position Near Assigned Landmark

  "For any set of 468 face landmarks with arbitrary coordinates in normalized space,
   after updateFromFace(worldPositions), each particle i must have its basePosition
   within the jitter radius of the world-space position of its assigned landmark
   (i % 468):

     |particle[i].basePosition - world(landmarks[i % 468])| ≤ jitterRadius

   where jitterRadius = 0.02 * viewportWidth."

  Validates: Requirement 5.2
  "WHEN Face_Tracker cung cấp 468 Landmark, THE Particle_Cloud SHALL phân bổ các
   Particle dựa trên vị trí của các Landmark khuôn mặt với nhiễu ngẫu nhiên (jitter)
   trong bán kính 0.02 đơn vị chuẩn hóa (tương đương 0.02 * viewportWidth trong
   Three.js world units)."

  How to run: Open this file in Chrome via localhost or HTTPS.
  Results are printed to the on-screen log and the browser console.
-->
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Property Test — ParticleSystem Base Position Near Landmark</title>
    <style>
        body {
            font-family: monospace;
            background: #0d0d0d;
            color: #e0e0e0;
            padding: 24px;
            margin: 0;
        }

        h1 {
            color: #00ffff;
            margin-bottom: 4px;
            font-size: 1.1rem;
        }

        h2 {
            color: #aaa;
            font-size: 0.85rem;
            font-weight: normal;
            margin-top: 0;
        }

        #log {
            margin-top: 20px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .pass {
            color: #00ff88;
        }

        .fail {
            color: #ff4444;
        }

        .info {
            color: #aaaaaa;
        }

        .warn {
            color: #ffcc00;
        }

        .title {
            color: #00ccff;
            font-weight: bold;
        }

        #summary {
            margin-top: 24px;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
        }

        #summary.all-pass {
            background: #003322;
            color: #00ff88;
            border: 1px solid #00ff88;
        }

        #summary.has-fail {
            background: #330000;
            color: #ff4444;
            border: 1px solid #ff4444;
        }
    </style>
</head>

<body>
    <h1>Property Test — ParticleSystem Base Position Near Landmark</h1>
    <h2>
        Feature: webcam-particle-face-ar &nbsp;|&nbsp;
        Property 8 &nbsp;|&nbsp;
        Validates: Requirement 5.2
    </h2>
    <div id="log"></div>
    <div id="summary"></div>

    <!-- fast-check (same version as the rest of the project) -->
    <script src="https://cdn.jsdelivr.net/npm/fast-check@3.13.2/lib/bundle/fast-check.min.js"></script>

    <!-- Minimal THREE stubs — only the subset used by ParticleSystem is needed -->
    <script>
        const THREE = {
            BufferAttribute: class BufferAttribute {
                constructor(array, itemSize) {
                    this.array = array;
                    this.itemSize = itemSize;
                    this.needsUpdate = false;
                }
            },

            BufferGeometry: class BufferGeometry {
                constructor() { this._attrs = {}; }
                setAttribute(name, attr) { this._attrs[name] = attr; }
                get attributes() { return this._attrs; }
                dispose() { }
            },

            PointsMaterial: class PointsMaterial {
                constructor(opts) { Object.assign(this, opts); }
            },

            Vector3: class Vector3 {
                constructor(x = 0, y = 0, z = 0) { this.x = x; this.y = y; this.z = z; }
                set(x, y, z) { this.x = x; this.y = y; this.z = z; return this; }
                copy(v) { this.x = v.x; this.y = v.y; this.z = v.z; return this; }
                lerp(v, t) {
                    this.x += (v.x - this.x) * t;
                    this.y += (v.y - this.y) * t;
                    this.z += (v.z - this.z) * t;
                    return this;
                }
            },
        };

        // Points is defined after Vector3 so it can reference it
        THREE.Points = class Points {
            constructor(geometry, material) {
                this.geometry = geometry;
                this.material = material;
                this.position = new THREE.Vector3();
                this.scale = { setScalar(s) { } };
            }
        };
    </script>

    <!-- CONSTANTS (full set so ParticleSystem resolves every reference) -->
    <script>
        const CONSTANTS = {
            DEPTH_SCALE: 50,
            DEFAULT_PARTICLE_COUNT: 2000,
            MIN_PARTICLES: 500,
            MAX_PARTICLES: 5000,
            LERP_POSITION: 0.1,
            LERP_SCALE: 0.08,
            LERP_BACK: 0.01,
            JITTER_RADIUS_NORMALIZED: 0.02,
            HAND_DIST_MIN: 0.05,
            HAND_DIST_MAX: 0.8,
            SCALE_MIN: 0.3,
            SCALE_MAX: 3.0,
            CAMERA_FOV: 75,
            CAMERA_Z: 100,
        };
    </script>

    <!-- Modules under test -->
    <script src="../../js/CoordinateMapper.js"></script>
    <script src="../../js/ParticleSystem.js"></script>

    <script>
        // -------------------------------------------------------------------------
        // Minimal test harness (consistent with other property test files)
        // -------------------------------------------------------------------------
        const logEl = document.getElementById('log');
        const summaryEl = document.getElementById('summary');
        const results = [];

        function log(msg, cls = 'info') {
            const span = document.createElement('span');
            span.className = cls;
            span.textContent = msg + '\n';
            logEl.appendChild(span);
            console.log(msg);
        }

        function recordResult(name, passed, detail = '') {
            results.push({ name, passed });
            if (passed) {
                log(`  ✓ PASS  ${name}`, 'pass');
            } else {
                log(`  ✗ FAIL  ${name}`, 'fail');
                if (detail) log(`         ${detail}`, 'fail');
            }
        }

        // -------------------------------------------------------------------------
        // Helpers
        // -------------------------------------------------------------------------

        /**
         * Build a CoordinateMapper backed by a synthetic renderer with the given
         * aspect ratio.  The mapper is used both to:
         *   1. Produce the worldPositions Float32Array fed into updateFromFace()
         *   2. Compute the expected world position of each landmark for verification
         *   3. Provide computeViewport() to ParticleSystem for jitter radius
         */
        function makeMapper(aspect) {
            const renderer = { domElement: { width: aspect * 100, height: 100 } };
            return new CoordinateMapper({}, renderer);
        }

        /**
         * Build a minimal scene stub.
         */
        function makeScene() {
            return { add() { }, remove() { } };
        }

        /**
         * Create, initialise, and return a ParticleSystem with the given count,
         * sharing the same CoordinateMapper instance used for landmark conversion.
         */
        function makeParticleSystem(mapper, count) {
            const ps = new ParticleSystem(makeScene(), mapper, count);
            ps.init();
            return ps;
        }

        /**
         * Euclidean distance between two {x,y,z} objects.
         */
        function dist3(a, b) {
            const dx = a.x - b.x;
            const dy = a.y - b.y;
            const dz = a.z - b.z;
            return Math.sqrt(dx * dx + dy * dy + dz * dz);
        }

        // -------------------------------------------------------------------------
        // Property 8: Particle Base Position Near Assigned Landmark
        // Feature: webcam-particle-face-ar, Property 8: Particle Base Position Near Assigned Landmark
        // Validates: Requirement 5.2
        // -------------------------------------------------------------------------

        /**
         * 8a — Core property: after updateFromFace(), every particle's basePosition
         *      is within jitterRadius of world(landmarks[i % 468]).
         *
         * Generator: 468 landmarks with x,y ∈ [0,1] and z ∈ [-1,1] (normalized space),
         *            plus a random aspect ratio to exercise different viewport widths.
         * Particle count: 2000 (default) — exercises both i < 468 and i ≥ 468 (modulo wrap).
         */
        async function runProperty8a() {
            log('\n── Property 8a: basePosition within jitterRadius of assigned landmark ──', 'title');
            log('   Validates: Requirement 5.2', 'info');
            log('   Generator: fc.array(fc.record({x,y,z}), {minLength:468,maxLength:468})', 'info');
            log('   Particle count: 2000 (default), Iterations: 100\n', 'info');

            let passed = true;
            let failDetail = '';

            const lmArb = fc.record({
                x: fc.float({ min: 0, max: 1, noNaN: true }),
                y: fc.float({ min: 0, max: 1, noNaN: true }),
                z: fc.float({ min: -1, max: 1, noNaN: true }),
            });

            try {
                await fc.assert(
                    fc.asyncProperty(
                        fc.array(lmArb, { minLength: 468, maxLength: 468 }),
                        fc.float({ min: 0.5, max: 3.0, noNaN: true }), // aspect ratio
                        async (landmarks, aspect) => {
                            const mapper = makeMapper(aspect);
                            const ps = makeParticleSystem(mapper, 2000);

                            // Convert landmarks to the Float32Array format that
                            // updateFromFace() expects (same as mapFaceLandmarks output)
                            const worldPositions = mapper.mapFaceLandmarks(landmarks, false);
                            ps.updateFromFace(worldPositions);

                            // Jitter radius used by ParticleSystem
                            const jitterRadius =
                                CONSTANTS.JITTER_RADIUS_NORMALIZED *
                                mapper.computeViewport().width;

                            // Verify every particle
                            const basePos = ps._basePositions;
                            const count = ps.currentCount; // 2000

                            for (let i = 0; i < count; i++) {
                                const lmIdx = i % 468;

                                // Expected world position of the assigned landmark
                                const expected = mapper.landmarkToWorld(landmarks[lmIdx], false);

                                // Actual base position stored by ParticleSystem
                                const actual = {
                                    x: basePos[i * 3],
                                    y: basePos[i * 3 + 1],
                                    z: basePos[i * 3 + 2],
                                };

                                const d = dist3(actual, expected);
                                if (d > jitterRadius + 1e-6) {
                                    throw new Error(
                                        `Particle ${i} (landmark ${lmIdx}): ` +
                                        `distance ${d.toFixed(4)} > jitterRadius ${jitterRadius.toFixed(4)}\n` +
                                        `  expected world: (${expected.x.toFixed(3)}, ${expected.y.toFixed(3)}, ${expected.z.toFixed(3)})\n` +
                                        `  actual base:    (${actual.x.toFixed(3)}, ${actual.y.toFixed(3)}, ${actual.z.toFixed(3)})`
                                    );
                                }
                            }
                        }
                    ),
                    { numRuns: 100 }
                );
            } catch (err) {
                passed = false;
                failDetail = err.message || String(err);
            }

            recordResult(
                'Property 8a — every particle basePosition within jitterRadius of world(landmarks[i % 468])',
                passed,
                failDetail
            );
        }

        /**
         * 8b — Modulo wrap: particles with index ≥ 468 correctly wrap around and
         *      are assigned to landmark (i % 468), not landmark 0 or landmark i.
         *
         * Strategy: use a small, distinct landmark set where each landmark maps to
         * a clearly different world position, then verify particles at indices
         * 468, 469, … are near landmarks 0, 1, … respectively.
         */
        async function runProperty8b() {
            log('\n── Property 8b: modulo wrap — particles ≥ 468 assigned to landmark i % 468 ──', 'title');
            log('   Validates: Requirement 5.2', 'info');
            log('   Iterations: 100\n', 'info');

            let passed = true;
            let failDetail = '';

            const lmArb = fc.record({
                x: fc.float({ min: 0, max: 1, noNaN: true }),
                y: fc.float({ min: 0, max: 1, noNaN: true }),
                z: fc.float({ min: -1, max: 1, noNaN: true }),
            });

            try {
                await fc.assert(
                    fc.asyncProperty(
                        fc.array(lmArb, { minLength: 468, maxLength: 468 }),
                        fc.float({ min: 0.5, max: 3.0, noNaN: true }),
                        async (landmarks, aspect) => {
                            const mapper = makeMapper(aspect);
                            const ps = makeParticleSystem(mapper, 2000);

                            const worldPositions = mapper.mapFaceLandmarks(landmarks, false);
                            ps.updateFromFace(worldPositions);

                            const jitterRadius =
                                CONSTANTS.JITTER_RADIUS_NORMALIZED *
                                mapper.computeViewport().width;

                            const basePos = ps._basePositions;

                            // Spot-check a handful of particles beyond the first 468
                            const checkIndices = [468, 469, 500, 935, 999, 1500, 1999];
                            for (const i of checkIndices) {
                                if (i >= ps.currentCount) continue;

                                const lmIdx = i % 468;
                                const expected = mapper.landmarkToWorld(landmarks[lmIdx], false);
                                const actual = {
                                    x: basePos[i * 3],
                                    y: basePos[i * 3 + 1],
                                    z: basePos[i * 3 + 2],
                                };

                                const d = dist3(actual, expected);
                                if (d > jitterRadius + 1e-6) {
                                    throw new Error(
                                        `Particle ${i} (landmark ${lmIdx} via modulo): ` +
                                        `distance ${d.toFixed(4)} > jitterRadius ${jitterRadius.toFixed(4)}`
                                    );
                                }
                            }
                        }
                    ),
                    { numRuns: 100 }
                );
            } catch (err) {
                passed = false;
                failDetail = err.message || String(err);
            }

            recordResult(
                'Property 8b — particles at index ≥ 468 wrap correctly to landmark i % 468',
                passed,
                failDetail
            );
        }

        /**
         * 8c — Jitter is bounded: the displacement from the landmark world position
         *      is strictly ≤ jitterRadius (not zero, not unbounded).
         *
         * This sub-property verifies the jitter radius formula itself:
         *   jitterRadius = JITTER_RADIUS_NORMALIZED * viewportWidth
         *                = 0.02 * viewportWidth
         *
         * It also verifies that jitter is non-deterministic (particles are not
         * placed exactly at the landmark) by running updateFromFace() twice with
         * the same landmarks and checking that at least one particle moved.
         */
        async function runProperty8c() {
            log('\n── Property 8c: jitter radius scales with viewportWidth ──', 'title');
            log('   Validates: Requirement 5.2', 'info');
            log('   Iterations: 100\n', 'info');

            let passed = true;
            let failDetail = '';

            const lmArb = fc.record({
                x: fc.float({ min: 0, max: 1, noNaN: true }),
                y: fc.float({ min: 0, max: 1, noNaN: true }),
                z: fc.float({ min: -1, max: 1, noNaN: true }),
            });

            try {
                await fc.assert(
                    fc.asyncProperty(
                        fc.array(lmArb, { minLength: 468, maxLength: 468 }),
                        fc.float({ min: 0.5, max: 3.0, noNaN: true }),
                        async (landmarks, aspect) => {
                            const mapper = makeMapper(aspect);
                            const ps = makeParticleSystem(mapper, 500); // minimum count

                            const worldPositions = mapper.mapFaceLandmarks(landmarks, false);
                            ps.updateFromFace(worldPositions);

                            const { width } = mapper.computeViewport();
                            const expectedRadius =
                                CONSTANTS.JITTER_RADIUS_NORMALIZED * width; // 0.02 * width

                            const basePos = ps._basePositions;
                            const count = ps.currentCount;

                            for (let i = 0; i < count; i++) {
                                const lmIdx = i % 468;
                                const expected = mapper.landmarkToWorld(landmarks[lmIdx], false);
                                const actual = {
                                    x: basePos[i * 3],
                                    y: basePos[i * 3 + 1],
                                    z: basePos[i * 3 + 2],
                                };

                                const d = dist3(actual, expected);
                                if (d > expectedRadius + 1e-6) {
                                    throw new Error(
                                        `Particle ${i}: jitter distance ${d.toFixed(4)} ` +
                                        `exceeds expected radius ${expectedRadius.toFixed(4)} ` +
                                        `(aspect=${aspect.toFixed(3)}, viewportWidth=${width.toFixed(3)})`
                                    );
                                }
                            }
                        }
                    ),
                    { numRuns: 100 }
                );
            } catch (err) {
                passed = false;
                failDetail = err.message || String(err);
            }

            recordResult(
                'Property 8c — jitter radius = 0.02 * viewportWidth (scales with aspect ratio)',
                passed,
                failDetail
            );
        }

        /**
         * 8d — Mirror mode: when worldPositions are produced with mirrorMode=true,
         *      each particle's basePosition is still within jitterRadius of the
         *      mirrored world position of its assigned landmark.
         *
         * This ensures updateFromFace() is agnostic to the coordinate system used
         * by the caller — it only cares that the Float32Array it receives is correct.
         */
        async function runProperty8d() {
            log('\n── Property 8d: basePosition near landmark in mirror mode ──', 'title');
            log('   Validates: Requirement 5.2', 'info');
            log('   Iterations: 100\n', 'info');

            let passed = true;
            let failDetail = '';

            const lmArb = fc.record({
                x: fc.float({ min: 0, max: 1, noNaN: true }),
                y: fc.float({ min: 0, max: 1, noNaN: true }),
                z: fc.float({ min: -1, max: 1, noNaN: true }),
            });

            try {
                await fc.assert(
                    fc.asyncProperty(
                        fc.array(lmArb, { minLength: 468, maxLength: 468 }),
                        fc.float({ min: 0.5, max: 3.0, noNaN: true }),
                        async (landmarks, aspect) => {
                            const mapper = makeMapper(aspect);
                            const ps = makeParticleSystem(mapper, 2000);

                            // Produce world positions in mirror mode
                            const worldPositions = mapper.mapFaceLandmarks(landmarks, true);
                            ps.updateFromFace(worldPositions);

                            const jitterRadius =
                                CONSTANTS.JITTER_RADIUS_NORMALIZED *
                                mapper.computeViewport().width;

                            const basePos = ps._basePositions;
                            const count = ps.currentCount;

                            for (let i = 0; i < count; i++) {
                                const lmIdx = i % 468;
                                // Expected: mirrored world position
                                const expected = mapper.landmarkToWorld(landmarks[lmIdx], true);
                                const actual = {
                                    x: basePos[i * 3],
                                    y: basePos[i * 3 + 1],
                                    z: basePos[i * 3 + 2],
                                };

                                const d = dist3(actual, expected);
                                if (d > jitterRadius + 1e-6) {
                                    throw new Error(
                                        `Mirror mode — Particle ${i} (landmark ${lmIdx}): ` +
                                        `distance ${d.toFixed(4)} > jitterRadius ${jitterRadius.toFixed(4)}`
                                    );
                                }
                            }
                        }
                    ),
                    { numRuns: 100 }
                );
            } catch (err) {
                passed = false;
                failDetail = err.message || String(err);
            }

            recordResult(
                'Property 8d — basePosition within jitterRadius of mirrored landmark (mirror mode)',
                passed,
                failDetail
            );
        }

        // -------------------------------------------------------------------------
        // Edge-case tests (example-based, complement the PBT properties)
        // -------------------------------------------------------------------------
        async function runEdgeCases() {
            log('\n── Edge Cases (complement to Property 8) ──', 'title');

            // Build a fixed set of 468 landmarks spread across the normalized space
            const landmarks = Array.from({ length: 468 }, (_, i) => ({
                x: (i % 22) / 21,          // x cycles 0→1 across 22 steps
                y: Math.floor(i / 22) / 21, // y steps down
                z: (i % 3 - 1) * 0.5,      // z ∈ {-0.5, 0, 0.5}
            }));

            const aspect = 16 / 9;
            const mapper = makeMapper(aspect);
            const worldPositions = mapper.mapFaceLandmarks(landmarks, false);
            const jitterRadius = CONSTANTS.JITTER_RADIUS_NORMALIZED * mapper.computeViewport().width;

            // Case 1: minimum particle count (500) — all particles within first 468 landmarks
            {
                const ps = makeParticleSystem(mapper, 500);
                ps.updateFromFace(worldPositions);
                let allOk = true;
                for (let i = 0; i < ps.currentCount; i++) {
                    const lmIdx = i % 468;
                    const expected = mapper.landmarkToWorld(landmarks[lmIdx], false);
                    const d = dist3(
                        { x: ps._basePositions[i * 3], y: ps._basePositions[i * 3 + 1], z: ps._basePositions[i * 3 + 2] },
                        expected
                    );
                    if (d > jitterRadius + 1e-6) { allOk = false; break; }
                }
                recordResult(
                    'Edge: minimum count (500) — all particles within jitterRadius',
                    allOk,
                    allOk ? '' : 'At least one particle exceeded jitterRadius'
                );
            }

            // Case 2: maximum particle count (5000) — exercises many modulo wraps
            {
                const ps = makeParticleSystem(mapper, 5000);
                ps.updateFromFace(worldPositions);
                let allOk = true;
                let failMsg = '';
                for (let i = 0; i < ps.currentCount; i++) {
                    const lmIdx = i % 468;
                    const expected = mapper.landmarkToWorld(landmarks[lmIdx], false);
                    const d = dist3(
                        { x: ps._basePositions[i * 3], y: ps._basePositions[i * 3 + 1], z: ps._basePositions[i * 3 + 2] },
                        expected
                    );
                    if (d > jitterRadius + 1e-6) {
                        allOk = false;
                        failMsg = `Particle ${i} (lm ${lmIdx}): dist=${d.toFixed(4)} > radius=${jitterRadius.toFixed(4)}`;
                        break;
                    }
                }
                recordResult(
                    'Edge: maximum count (5000) — all particles within jitterRadius',
                    allOk,
                    failMsg
                );
            }

            // Case 3: calling updateFromFace() twice — second call overwrites basePositions
            {
                const ps = makeParticleSystem(mapper, 2000);
                ps.updateFromFace(worldPositions);

                // Second set of landmarks (shifted)
                const landmarks2 = landmarks.map(lm => ({
                    x: Math.min(1, lm.x + 0.1),
                    y: Math.min(1, lm.y + 0.1),
                    z: lm.z,
                }));
                const worldPositions2 = mapper.mapFaceLandmarks(landmarks2, false);
                ps.updateFromFace(worldPositions2);

                const jitterRadius2 = CONSTANTS.JITTER_RADIUS_NORMALIZED * mapper.computeViewport().width;
                let allOk = true;
                for (let i = 0; i < ps.currentCount; i++) {
                    const lmIdx = i % 468;
                    const expected = mapper.landmarkToWorld(landmarks2[lmIdx], false);
                    const d = dist3(
                        { x: ps._basePositions[i * 3], y: ps._basePositions[i * 3 + 1], z: ps._basePositions[i * 3 + 2] },
                        expected
                    );
                    if (d > jitterRadius2 + 1e-6) { allOk = false; break; }
                }
                recordResult(
                    'Edge: second updateFromFace() call overwrites basePositions correctly',
                    allOk,
                    allOk ? '' : 'basePositions not updated on second call'
                );
            }

            // Case 4: empty worldPositions — updateFromFace() should be a no-op
            {
                const ps = makeParticleSystem(mapper, 2000);
                ps.updateFromFace(worldPositions); // first call sets basePositions
                const snapshot = new Float32Array(ps._basePositions);

                ps.updateFromFace(new Float32Array(0)); // empty → no-op
                let unchanged = true;
                for (let i = 0; i < snapshot.length; i++) {
                    if (snapshot[i] !== ps._basePositions[i]) { unchanged = false; break; }
                }
                recordResult(
                    'Edge: empty worldPositions → basePositions unchanged (no-op)',
                    unchanged,
                    unchanged ? '' : 'basePositions were modified by empty updateFromFace()'
                );
            }
        }

        // -------------------------------------------------------------------------
        // Run all tests
        // -------------------------------------------------------------------------
        async function runAll() {
            log('Starting ParticleSystem base-position-near-landmark property tests…\n', 'info');

            await runProperty8a();
            await runProperty8b();
            await runProperty8c();
            await runProperty8d();
            await runEdgeCases();

            const total = results.length;
            const passed = results.filter(r => r.passed).length;
            const failed = total - passed;

            log('', 'info');
            summaryEl.className = failed === 0 ? 'all-pass' : 'has-fail';
            summaryEl.textContent = failed === 0
                ? `✓ All ${total} tests passed`
                : `✗ ${failed} of ${total} tests FAILED`;

            console.log(`\nResults: ${passed}/${total} passed`);
        }

        document.addEventListener('DOMContentLoaded', runAll);
    </script>
</body>

</html>
