<!DOCTYPE html>
<!--
  Property Test: Lerp Smoothing Correctness
  Feature: webcam-particle-face-ar, Property 6: Lerp Smoothing Correctness

  Validates: Requirements 5.5, 7.3
  "THE Renderer SHALL áp dụng nội suy tuyến tính (lerp) với hệ số 0.1 cho vị trí Particle_Cloud
   để tạo chuyển động mượt mà." (Req 5.5)
  "THE Particle_Cloud SHALL áp dụng nội suy tuyến tính (lerp) với hệ số 0.08 cho giá trị scale
   để tránh thay đổi đột ngột." (Req 7.3)

  How to run: Open this file in Chrome via localhost or HTTPS.
  Results are printed to the on-screen log and the browser console.
-->
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Property Test — Lerp Smoothing</title>
    <style>
        body {
            font-family: monospace;
            background: #0d0d0d;
            color: #e0e0e0;
            padding: 24px;
            margin: 0;
        }

        h1 {
            color: #00ffff;
            margin-bottom: 4px;
            font-size: 1.1rem;
        }

        h2 {
            color: #aaa;
            font-size: 0.85rem;
            font-weight: normal;
            margin-top: 0;
        }

        #log {
            margin-top: 20px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .pass {
            color: #00ff88;
        }

        .fail {
            color: #ff4444;
        }

        .info {
            color: #aaaaaa;
        }

        .warn {
            color: #ffcc00;
        }

        .title {
            color: #00ccff;
            font-weight: bold;
        }

        #summary {
            margin-top: 24px;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
        }

        #summary.all-pass {
            background: #003322;
            color: #00ff88;
            border: 1px solid #00ff88;
        }

        #summary.has-fail {
            background: #330000;
            color: #ff4444;
            border: 1px solid #ff4444;
        }
    </style>
</head>

<body>
    <h1>Property Test — Lerp Smoothing</h1>
    <h2>
        Feature: webcam-particle-face-ar &nbsp;|&nbsp; Property 6 &nbsp;|&nbsp;
        Validates: Requirements 5.5, 7.3
    </h2>
    <div id="log"></div>
    <div id="summary"></div>

    <!-- fast-check (same CDN version as index.html) -->
    <script src="https://cdn.jsdelivr.net/npm/fast-check@3.13.2/lib/bundle/fast-check.min.js"></script>

    <script>
        // -------------------------------------------------------------------------
        // Pure lerp function extracted from ParticleSystem.js lerpScale logic:
        //   this._cloudScale += (target - this._cloudScale) * factor
        // which is equivalent to:
        //   result = current + (target - current) * factor
        // This is the same formula used for both position lerp (factor=0.1, Req 5.5)
        // and scale lerp (factor=0.08, Req 7.3).
        // -------------------------------------------------------------------------
        function lerp(current, target, factor) {
            return current + (target - current) * factor;
        }

        // -------------------------------------------------------------------------
        // Minimal test harness
        // -------------------------------------------------------------------------
        const logEl = document.getElementById('log');
        const summaryEl = document.getElementById('summary');
        const results = [];

        function log(msg, cls = 'info') {
            const span = document.createElement('span');
            span.className = cls;
            span.textContent = msg + '\n';
            logEl.appendChild(span);
            console.log(msg);
        }

        function recordResult(name, passed, detail = '') {
            results.push({ name, passed });
            if (passed) {
                log(`  ✓ PASS  ${name}`, 'pass');
            } else {
                log(`  ✗ FAIL  ${name}`, 'fail');
                if (detail) log(`         ${detail}`, 'fail');
            }
        }

        // Floating-point tolerance for formula verification
        const EPS = 1e-4;
        function near(a, b) { return Math.abs(a - b) < EPS; }

        // -------------------------------------------------------------------------
        // Property 6a: Lerp Formula Correctness
        // Feature: webcam-particle-face-ar, Property 6: Lerp Smoothing Correctness
        // Validates: Requirements 5.5, 7.3
        //
        // For any (current, target, factor ∈ (0,1)):
        //   lerp(current, target, factor) = current + (target - current) * factor
        // -------------------------------------------------------------------------
        async function runProperty6a() {
            log('\n── Property 6a: Lerp Formula Correctness ──', 'title');
            log('   Validates: Requirements 5.5, 7.3', 'info');
            log('   Iterations: 100\n', 'info');

            let passed = true;
            let failDetail = '';

            try {
                await fc.assert(
                    fc.asyncProperty(
                        // (current, target, factor) — filter out non-finite values
                        fc.tuple(
                            fc.float(),
                            fc.float(),
                            fc.float({ min: 0.001, max: 0.999 })
                        ).filter(([c, t, _f]) =>
                            isFinite(c) && isFinite(t)
                        ),
                        async ([current, target, factor]) => {
                            const result = lerp(current, target, factor);

                            // Skip if result is non-finite (overflow from extreme floats)
                            if (!isFinite(result)) return;

                            const expected = current + (target - current) * factor;

                            if (!isFinite(expected)) return;

                            if (!near(result, expected)) {
                                throw new Error(
                                    `lerp(${current}, ${target}, ${factor}) = ${result}, ` +
                                    `expected ${expected}`
                                );
                            }
                        }
                    ),
                    { numRuns: 100 }
                );
            } catch (err) {
                passed = false;
                failDetail = err.message || String(err);
            }

            recordResult(
                'Property 6a — lerp(c, t, f) = c + (t - c) * f',
                passed,
                failDetail
            );
        }

        // -------------------------------------------------------------------------
        // Property 6b: Lerp Always Moves Closer to Target
        // Feature: webcam-particle-face-ar, Property 6: Lerp Smoothing Correctness
        // Validates: Requirements 5.5, 7.3
        //
        // For any (current, target, factor ∈ (0,1)) where current ≠ target:
        //   |lerp(current, target, factor) - target| < |current - target|
        // -------------------------------------------------------------------------
        async function runProperty6b() {
            log('\n── Property 6b: Lerp Always Moves Closer to Target ──', 'title');
            log('   Validates: Requirements 5.5, 7.3', 'info');
            log('   Iterations: 100\n', 'info');

            let passed = true;
            let failDetail = '';

            try {
                await fc.assert(
                    fc.asyncProperty(
                        // (current, target, factor) — filter out non-finite values and c === t
                        fc.tuple(
                            fc.float(),
                            fc.float(),
                            fc.float({ min: 0.001, max: 0.999 })
                        ).filter(([c, t, _f]) =>
                            isFinite(c) && isFinite(t) && c !== t
                        ),
                        async ([current, target, factor]) => {
                            const result = lerp(current, target, factor);

                            // Skip if result is non-finite (overflow from extreme floats)
                            if (!isFinite(result)) return;

                            const distBefore = Math.abs(current - target);
                            const distAfter = Math.abs(result - target);

                            if (!isFinite(distBefore) || !isFinite(distAfter)) return;

                            if (distAfter >= distBefore) {
                                throw new Error(
                                    `lerp did not move closer to target:\n` +
                                    `  current=${current}, target=${target}, factor=${factor}\n` +
                                    `  result=${result}\n` +
                                    `  |result - target|=${distAfter} >= |current - target|=${distBefore}`
                                );
                            }
                        }
                    ),
                    { numRuns: 100 }
                );
            } catch (err) {
                passed = false;
                failDetail = err.message || String(err);
            }

            recordResult(
                'Property 6b — |lerp(c,t,f) - t| < |c - t| when c ≠ t',
                passed,
                failDetail
            );
        }

        // -------------------------------------------------------------------------
        // Property 6c: Lerp with factor=0 returns current; factor=1 returns target
        // (boundary sanity check, complements the PBT above)
        // -------------------------------------------------------------------------
        async function runProperty6c() {
            log('\n── Property 6c: Lerp Boundary Values (factor=0 and factor=1) ──', 'title');
            log('   Validates: Requirements 5.5, 7.3', 'info');
            log('   Iterations: 100\n', 'info');

            let passed = true;
            let failDetail = '';

            try {
                await fc.assert(
                    fc.asyncProperty(
                        fc.tuple(
                            fc.float(),
                            fc.float()
                        ).filter(([c, t]) => isFinite(c) && isFinite(t)),
                        async ([current, target]) => {
                            // factor = 0 → result should equal current
                            const atZero = lerp(current, target, 0);
                            if (atZero !== current) {
                                throw new Error(
                                    `lerp(${current}, ${target}, 0) = ${atZero}, expected ${current}`
                                );
                            }

                            // factor = 1 → result should equal target
                            const atOne = lerp(current, target, 1);
                            if (atOne !== target) {
                                throw new Error(
                                    `lerp(${current}, ${target}, 1) = ${atOne}, expected ${target}`
                                );
                            }
                        }
                    ),
                    { numRuns: 100 }
                );
            } catch (err) {
                passed = false;
                failDetail = err.message || String(err);
            }

            recordResult(
                'Property 6c — lerp(c,t,0)=c and lerp(c,t,1)=t',
                passed,
                failDetail
            );
        }

        // -------------------------------------------------------------------------
        // Property 6d: Lerp with canonical factors (0.1 for position, 0.08 for scale)
        // Verifies the specific factors used in ParticleSystem.lerpToTarget and lerpScale
        // Feature: webcam-particle-face-ar, Property 6: Lerp Smoothing Correctness
        // Validates: Requirements 5.5, 7.3
        // -------------------------------------------------------------------------
        async function runProperty6d() {
            log('\n── Property 6d: Lerp with Canonical Factors (0.1 and 0.08) ──', 'title');
            log('   Validates: Requirements 5.5, 7.3', 'info');
            log('   Iterations: 100\n', 'info');

            let passed = true;
            let failDetail = '';

            try {
                await fc.assert(
                    fc.asyncProperty(
                        fc.tuple(
                            fc.float(),
                            fc.float()
                        ).filter(([c, t]) => isFinite(c) && isFinite(t)),
                        async ([current, target]) => {
                            // Position lerp factor = 0.1 (Req 5.5)
                            const posResult = lerp(current, target, 0.1);
                            const posExpected = current + (target - current) * 0.1;
                            if (isFinite(posResult) && isFinite(posExpected) && !near(posResult, posExpected)) {
                                throw new Error(
                                    `Position lerp (factor=0.1): lerp(${current}, ${target}, 0.1) = ${posResult}, ` +
                                    `expected ${posExpected}`
                                );
                            }

                            // Scale lerp factor = 0.08 (Req 7.3)
                            const scaleResult = lerp(current, target, 0.08);
                            const scaleExpected = current + (target - current) * 0.08;
                            if (isFinite(scaleResult) && isFinite(scaleExpected) && !near(scaleResult, scaleExpected)) {
                                throw new Error(
                                    `Scale lerp (factor=0.08): lerp(${current}, ${target}, 0.08) = ${scaleResult}, ` +
                                    `expected ${scaleExpected}`
                                );
                            }
                        }
                    ),
                    { numRuns: 100 }
                );
            } catch (err) {
                passed = false;
                failDetail = err.message || String(err);
            }

            recordResult(
                'Property 6d — lerp with factor=0.1 (position) and factor=0.08 (scale) match formula',
                passed,
                failDetail
            );
        }

        // -------------------------------------------------------------------------
        // Run all properties
        // -------------------------------------------------------------------------
        async function runAll() {
            log('Starting lerp smoothing property tests…\n', 'info');

            await runProperty6a();
            await runProperty6b();
            await runProperty6c();
            await runProperty6d();

            const total = results.length;
            const passed = results.filter(r => r.passed).length;
            const failed = total - passed;

            log('', 'info');
            summaryEl.className = failed === 0 ? 'all-pass' : 'has-fail';
            summaryEl.textContent = failed === 0
                ? `✓ All ${total} tests passed`
                : `✗ ${failed} of ${total} tests FAILED`;

            console.log(`\nResults: ${passed}/${total} passed`);
        }

        document.addEventListener('DOMContentLoaded', runAll);
    </script>
</body>

</html>
